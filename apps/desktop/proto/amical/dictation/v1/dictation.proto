syntax = "proto3";

package amical.dictation.v1;

service DictationService {
  rpc StreamTranscribe(stream StreamTranscribeRequest) returns (stream StreamTranscribeEvent);
}

enum AudioEncoding {
  AUDIO_ENCODING_UNSPECIFIED = 0;
  AUDIO_ENCODING_PCM_S16LE = 1;
  // Raw Opus frames only. Do not send containerized WebM/Opus chunks here.
  AUDIO_ENCODING_OPUS = 2;
}

message AudioConfig {
  AudioEncoding encoding = 1;
  // Required for all streaming audio. This packet duration applies to the entire stream.
  // PCM_S16LE always means 16 kHz mono 16-bit little-endian audio, and packets must match
  // this exact duration for that fixed format.
  // Raw Opus streams must use 20, 40, or 60 milliseconds.
  uint32 packet_duration_ms = 2;
}

message StreamContext {
  string selected_text = 1;
  string before_text = 2;
  string after_text = 3;
  string app_type = 4;
  string app_bundle_id = 5;
  string app_name = 6;
  string app_url = 7;
}

message AutoLanguage {}


message LanguageList {
  repeated Language items = 1;
}

message StreamLanguageConfig {
  oneof mode {
    AutoLanguage auto = 1;
    LanguageList languages = 2;
  }
}

message StreamOpen {
  // Required client-side dictation session id used for stream correlation.
  string session_id = 1;
  AudioConfig audio_config = 2;
  StreamLanguageConfig language = 3;
  repeated string vocabulary = 4;
  optional bool formatting = 5;
}

message StreamContextUpdate {
  // Full snapshot replacement.
  StreamContext context = 1;
}

message StreamAudioBatch {
  // chunks[0] has this seq; chunks[i] has seq = first_seq + i.
  uint64 first_seq = 1;
  // PCM_S16LE packet bytes or single raw Opus frames, depending on audio_config.encoding.
  repeated bytes chunks = 2;
}

message StreamFinalize {}

enum StreamCancelCode {
  STREAM_CANCEL_CODE_UNSPECIFIED = 0;
  STREAM_CANCEL_CODE_USER_ABORTED = 1;
}

message StreamCancel {
  optional StreamCancelCode code = 1;
}

message StreamTranscribeRequest {
  oneof payload {
    StreamOpen open = 1;
    StreamContextUpdate context_update = 2;
    StreamAudioBatch audio = 3;
    StreamFinalize finalize = 4;
    StreamCancel cancel = 5;
  }
}

message StreamStatus {
  // Echoes the client-provided session_id for correlation.
  string session_id = 1;
  // Highest contiguous audio sequence accepted by the server.
  uint64 accepted_through_seq = 2;
}

message FinalTranscript {
  string raw_transcript = 1;
  string formatted_transcript = 2;
  uint64 through_seq = 3;
}

message StreamTranscribeEvent {
  oneof payload {
    StreamStatus status = 1;
    FinalTranscript final = 2;
  }
}
